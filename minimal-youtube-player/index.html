<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Play any YouTube video or livestream without distraction.">
    <title>Minimal YouTube Player</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts: Geist, Geist Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        /* Waveform Animation */
        .waveform-bar {
            width: 4px;
            height: 18px;
            background-color: currentColor;
            border-radius: 2px;
            animation: waveform 1s ease-in-out infinite;
        }
        .waveform-bar:nth-child(1) { animation-delay: -1.0s; }
        .waveform-bar:nth-child(2) { animation-delay: -0.8s; }
        .waveform-bar:nth-child(3) { animation-delay: -0.6s; }
        .waveform-bar:nth-child(4) { animation-delay: -0.4s; }

        @keyframes waveform {
            0%, 100% { transform: scaleY(0.3); opacity: 0.6; }
            50% { transform: scaleY(1); opacity: 1; }
        }
        
        /* Zen Controls bottom pill */
        #zen-controls {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .zen-pill {
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .zen-pill-handle {
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            width: 48px;
            height: 4px;
        }
        .zen-pill-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            pointer-events: none;
        }
        #zen-controls:hover .zen-pill-content,
        #zen-controls:focus-within .zen-pill-content {
            max-height: 80px;
            opacity: 1;
            pointer-events: auto;
        }
        #zen-controls:hover .zen-pill-handle,
        #zen-controls:focus-within .zen-pill-handle {
            opacity: 0;
            transform: scaleX(0.5);
        }

        /* View Transitions for smooth, linear layout morphing */
        ::view-transition-old(*),
        ::view-transition-new(*) {
            animation-duration: 0.4s;
            animation-timing-function: linear;
        }

        #app-wrapper { view-transition-name: app-wrapper; }
        #video-wrapper { view-transition-name: video-wrapper; }
        #app-header { view-transition-name: app-header; }
        #action-bar { view-transition-name: action-bar; }
        #video-metadata { view-transition-name: video-metadata; }
        #audio-card { view-transition-name: audio-card; }
        #zen-controls { view-transition-name: zen-controls; }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 h-[100dvh] flex justify-center overflow-hidden transition-colors duration-500 ease-linear">

    <!-- Main App Container -->
    <div id="app-wrapper"
        class="w-full max-w-[480px] bg-white h-full sm:h-[95vh] sm:my-auto sm:rounded-2xl sm:shadow-2xl flex flex-col relative overflow-hidden border-slate-200 sm:border transition-all duration-300 ease-linear">

        <!-- Header -->
        <header id="app-header"
            class="bg-white/90 backdrop-blur-md z-20 border-b border-slate-100 p-4 sm:p-6 flex justify-between items-center flex-shrink-0 transition-colors duration-300 ease-linear">
            <div class="flex items-center gap-3">
                <div id="header-icon-bg"
                    class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white shadow-brand-500/30 shadow-lg transition-colors">
                    <i data-lucide="play" class="w-4 h-4"></i>
                </div>
                <h1 id="header-title" class="font-bold text-2xl tracking-tight text-slate-900 transition-colors">Minimal YouTube Player</h1>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-hidden relative bg-slate-50/50 flex flex-col transition-colors duration-300 ease-linear">
            
            <!-- Empty State (Placeholder) -->
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center p-6 transition-all duration-300 z-10 opacity-100 blur-none pointer-events-auto">
                <p class="text-sm text-slate-500 text-center max-w-[280px] leading-relaxed">
                    Play any YouTube video or livestream without distraction.
                </p>
            </div>

            <!-- Playing State (Video UI) -->
            <div id="playing-state" class="flex-1 overflow-y-auto flex flex-col opacity-0 blur-[2px] pointer-events-none transition-all duration-300 z-20 hidden">
                
                <!-- Fixed Player Container Wrapper -->
                <div id="video-wrapper" class="w-full aspect-video sticky top-0 z-10 flex-shrink-0 shadow-sm relative overflow-hidden bg-slate-100 transition-all duration-300 ease-linear">
                    
                    <!-- Video Skeleton Loader -->
                    <div id="video-skeleton" class="absolute inset-0 transition-all duration-300 z-20 opacity-100 pointer-events-auto">
                        <div class="w-full h-full bg-slate-200 animate-pulse"></div>
                    </div>
                    
                    <!-- Actual Video Player -->
                    <div id="video-container" class="absolute inset-0 bg-black transition-all duration-300 opacity-0 blur-[2px] pointer-events-none z-10 flex">
                        <iframe 
                            id="yt-iframe" 
                            class="w-full h-full border-0" 
                            referrerpolicy="strict-origin-when-cross-origin"
                            allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>

                <!-- Audio Card (Zen Mode) -->
                <div id="audio-card" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] sm:w-[600px] bg-[#121212] border border-white/10 rounded-3xl p-4 shadow-2xl z-50 flex items-center gap-5 pointer-events-auto">
                    <!-- Thumbnail -->
                    <div class="w-24 h-24 rounded-xl overflow-hidden shrink-0 shadow-lg relative bg-slate-800">
                        <img id="audio-thumbnail" src="" class="w-full h-full object-cover" alt="Thumbnail">
                    </div>
                    
                    <!-- Info -->
                    <div class="flex-1 min-w-0 pr-2">
                        <h3 id="audio-title" class="text-lg font-bold text-white leading-tight line-clamp-2"></h3>
                        <p id="audio-author" class="text-slate-400 text-sm font-medium mt-1 truncate"></p>
                    </div>

                    <!-- Right Side: Waveform / Play / Pause -->
                    <button id="audio-play-pause-btn" class="w-14 h-14 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center shrink-0 transition-colors group relative border border-white/10 mr-2">
                        <!-- Playing State (Waveform) -->
                        <div id="audio-waveform" class="flex items-center gap-[3px] text-white transition-opacity group-hover:opacity-0">
                            <div class="waveform-bar bg-white h-4 w-[3px]"></div>
                            <div class="waveform-bar bg-white h-4 w-[3px]"></div>
                            <div class="waveform-bar bg-white h-4 w-[3px]"></div>
                            <div class="waveform-bar bg-white h-4 w-[3px]"></div>
                        </div>
                        
                        <!-- Hover Pause -->
                        <i data-lucide="pause" id="audio-pause-icon" class="w-6 h-6 text-white absolute opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        
                        <!-- Paused State -->
                        <i data-lucide="play" id="audio-play-icon" class="w-6 h-6 text-white absolute hidden"></i>
                    </button>
                </div>

                <!-- YouTube App Mobile Simulation Metadata -->
                <div id="video-metadata" class="flex-1 relative bg-transparent transition-opacity duration-300 ease-linear">
                    
                    <!-- Meta Skeleton Loader Layer -->
                    <div id="meta-skeleton" class="absolute inset-0 p-4 sm:p-6 bg-transparent transition-all duration-300 z-20 opacity-100 pointer-events-auto">
                        <div class="animate-pulse flex flex-col">
                            <div class="h-[22px] bg-slate-200 rounded-md w-3/4"></div>
                            <div class="h-4 bg-slate-200 rounded-md w-1/3 mt-2.5"></div>
                        </div>
                    </div>

                    <!-- Meta Content Area Layer -->
                    <div id="meta-content" class="p-4 sm:p-6 transition-all duration-300 opacity-0 blur-[2px] pointer-events-none relative z-10">
                        <h2 id="meta-title" class="text-lg font-bold text-slate-900 leading-tight"></h2>
                        
                        <!-- Stats Row -->
                        <div class="flex items-center flex-wrap gap-x-1.5 gap-y-1 text-xs text-slate-500 mt-2.5 font-medium">
                            <span id="meta-author" class="text-slate-800 font-bold"></span>
                        </div>
                    </div>

                </div>
            </div>

        </main>

        <!-- Bottom Section Wrapper -->
        <div class="relative flex-shrink-0">
            <!-- Toast Notification Container -->
            <div id="toastContainer"
                class="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 sm:mb-6 z-[60] flex flex-col items-center gap-2 w-max max-w-[90%] pointer-events-none">
            </div>

            <!-- Bottom Action Bar -->
            <div id="action-bar"
                class="bg-white border-t border-slate-200 p-4 sm:px-6 sm:py-4 flex flex-col gap-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30 flex-shrink-0 transition-all duration-300 ease-linear">
            
            <div>
                <input type="text" id="yt-url"
                    class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-slate-400 font-medium"
                    placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
            </div>

            <!-- Dynamic Buttons Row -->
            <div class="flex h-[52px]">
                
                <button id="zen-btn"
                    class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center overflow-hidden shrink-0 max-w-0 opacity-0 px-0 h-full mr-0">
                    <div class="flex items-center justify-center min-w-[52px]">
                        <i data-lucide="maximize" class="w-5 h-5 shrink-0"></i>
                    </div>
                </button>

                <button id="play-btn"
                    class="flex-1 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white rounded-xl font-medium shadow-brand-500/30 shadow-lg transition-all duration-300 flex items-center justify-center group h-full overflow-hidden shrink-0 relative">
                    <!-- Default Content -->
                    <div id="play-content-default" class="absolute flex items-center gap-2 transition-all duration-300 opacity-100 blur-none">
                        <i data-lucide="play" class="w-5 h-5 fill-current shrink-0"></i>
                        <span class="whitespace-nowrap">Play</span>
                    </div>
                    <!-- Playing Waveform Content -->
                    <div id="play-content-playing" class="absolute flex items-center gap-[4px] text-brand-600 transition-all duration-300 opacity-0 blur-[2px] pointer-events-none">
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                    </div>
                </button>

                <button id="close-btn"
                    class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center overflow-hidden shrink-0 max-w-0 opacity-0 px-0 h-full ml-0">
                    <div class="flex items-center justify-center min-w-[52px]">
                        <i data-lucide="x" class="w-5 h-5 shrink-0"></i>
                    </div>
                </button>

            </div>
            </div>
        </div>

        <!-- Zen Mode Controls -->
        <div id="zen-controls" class="hidden absolute bottom-6 left-0 right-0 z-[60] flex flex-col items-center pointer-events-none">
            <!-- Outer pill wrapper, pointer-events enabled -->
            <div class="zen-pill pointer-events-auto flex flex-col items-center gap-2 group">

                <!-- Expanded content (revealed on hover) -->
                <div class="zen-pill-content">
                    <div class="bg-black/40 backdrop-blur-xl border border-white/10 rounded-full p-1.5 flex items-center gap-1 shadow-2xl">
                        <!-- Video/Audio Toggle Group -->
                        <div class="bg-white/10 rounded-full p-0.5 flex gap-0.5">
                            <button id="zen-video-btn" class="w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear bg-white/20 text-white shadow-sm" title="Video">
                                <i data-lucide="monitor" class="w-4 h-4"></i>
                            </button>
                            <button id="zen-audio-btn" class="w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear text-white/60 hover:text-white hover:bg-white/10" title="Audio">
                                <i data-lucide="headphones" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <!-- Divider -->
                        <div class="w-px h-5 bg-white/15 mx-0.5"></div>

                        <!-- Exit -->
                        <button id="exit-zen-btn" class="w-9 h-9 rounded-full flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all duration-200 ease-linear" title="Exit Zen Mode">
                            <i data-lucide="minimize" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Collapsed handle (the thin line) -->
                <div class="zen-pill-handle bg-white/40 rounded-full"></div>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // DOM Elements
        const els = {
            mainContent: document.getElementById('main-content'),
            emptyState: document.getElementById('empty-state'),
            playingState: document.getElementById('playing-state'),
            actionBar: document.getElementById('action-bar'),
            urlInput: document.getElementById('yt-url'),
            playBtn: document.getElementById('play-btn'),
            playContentDefault: document.getElementById('play-content-default'),
            playContentPlaying: document.getElementById('play-content-playing'),
            closeBtn: document.getElementById('close-btn'),
            zenBtn: document.getElementById('zen-btn'),
            exitZenBtn: document.getElementById('exit-zen-btn'),
            zenControls: document.getElementById('zen-controls'),
            zenVideoBtn: document.getElementById('zen-video-btn'),
            zenAudioBtn: document.getElementById('zen-audio-btn'),
            audioCard: document.getElementById('audio-card'),
            audioThumbnail: document.getElementById('audio-thumbnail'),
            audioTitle: document.getElementById('audio-title'),
            audioAuthor: document.getElementById('audio-author'),
            audioPlayPauseBtn: document.getElementById('audio-play-pause-btn'),
            audioWaveform: document.getElementById('audio-waveform'),
            audioPauseIcon: document.getElementById('audio-pause-icon'),
            audioPlayIcon: document.getElementById('audio-play-icon'),
            iframe: document.getElementById('yt-iframe'),
            appHeader: document.getElementById('app-header'),
            headerTitle: document.getElementById('header-title'),
            headerIconBg: document.getElementById('header-icon-bg'),
            toastContainer: document.getElementById('toastContainer'),
            appWrapper: document.getElementById('app-wrapper'),
            
            // Layout specific elements
            videoWrapper: document.getElementById('video-wrapper'),
            videoSkeleton: document.getElementById('video-skeleton'),
            videoContainer: document.getElementById('video-container'),
            videoMetadata: document.getElementById('video-metadata'),
            metaSkeleton: document.getElementById('meta-skeleton'),
            metaContent: document.getElementById('meta-content'),
            metaTitle: document.getElementById('meta-title'),
            metaAuthor: document.getElementById('meta-author')
        };

        let currentVideoId = null;
        let currentVideoUrl = '';
        let isZenPlaying = false;
        let currentZenMode = 'video';
        
        let isYTAPIReady = false;
        let ytPlayer = null;

        // YouTube IFrame API Callback
        window.onYouTubeIframeAPIReady = function() {
            isYTAPIReady = true;
        };

        function initYouTubePlayer() {
            ytPlayer = new YT.Player('yt-iframe', {
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function replaceIframe(url) {
            if (ytPlayer) {
                if (typeof ytPlayer.destroy === 'function') {
                    try {
                        ytPlayer.destroy();
                    } catch(e) {}
                }
                ytPlayer = null;
            }

            const newIframe = document.createElement('iframe');
            newIframe.id = 'yt-iframe';
            newIframe.className = 'w-full h-full border-0';
            newIframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
            newIframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen; picture-in-picture');
            newIframe.setAttribute('allowfullscreen', '');
            if (url) {
                newIframe.src = url;
            }
            
            els.videoContainer.innerHTML = '';
            els.videoContainer.appendChild(newIframe);
            
            els.iframe = newIframe;

            if (url && isYTAPIReady) {
                initYouTubePlayer();
            }
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            els.audioPauseIcon = document.getElementById('audio-pause-icon');
            els.audioPlayIcon = document.getElementById('audio-play-icon');
            
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            setupEventListeners();
            setupMobileHeight();
            history.replaceState({ view: 'index' }, '', '');
        });

        function setupEventListeners() {
            els.playBtn.addEventListener('click', () => handlePlay(false));
            els.closeBtn.addEventListener('click', () => handleClose(false));
            
            els.zenBtn.addEventListener('click', () => enterZenMode('video'));
            
            els.zenVideoBtn.addEventListener('click', () => {
                if (currentZenMode !== 'video') {
                    if (document.startViewTransition) document.startViewTransition(() => switchZenMode('video'));
                    else switchZenMode('video');
                }
            });
            els.zenAudioBtn.addEventListener('click', () => {
                if (currentZenMode !== 'audio') {
                    if (document.startViewTransition) document.startViewTransition(() => switchZenMode('audio'));
                    else switchZenMode('audio');
                }
            });

            els.audioPlayPauseBtn.addEventListener('click', togglePlayPause);
            els.exitZenBtn.addEventListener('click', () => history.back());
            els.urlInput.addEventListener('input', handleInputDetect);

            window.addEventListener('popstate', (e) => {
                const view = e.state && e.state.view;
                if (view === 'playing-zen') {
                    exitZenMode();
                } else if (view === 'playing') {
                    if (currentVideoId && !els.zenControls.classList.contains('hidden')) {
                        exitZenMode(); // Fallback if states desync
                    } else if (currentVideoId) {
                        handleClose(true);
                    }
                } else {
                    if (currentVideoId) {
                        handleClose(true);
                    }
                }
            });

            els.urlInput.addEventListener('blur', () => {
                setTimeout(() => {
                    if (currentVideoId && currentVideoUrl) {
                        const currentInputUrl = els.urlInput.value.trim();
                        if (currentInputUrl !== currentVideoUrl) {
                            els.urlInput.value = currentVideoUrl;
                            updatePlayButtonState(isZenPlaying ? 'playing' : 'paused');
                        }
                    }
                }, 250);
            });

            els.urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    els.urlInput.blur();
                    handlePlay(true);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !els.zenControls.classList.contains('hidden')) {
                    history.back();
                }
                
                if (e.key === ' ' || e.code === 'Space') {
                    if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                        return;
                    }
                    if (currentVideoId) {
                        e.preventDefault();
                        togglePlayPause();
                    }
                }
            });
        }

        // --- Mobile Layout Fix ---
        function setupMobileHeight() {
            const app = document.getElementById('app-wrapper');
            if (!app) return;

            function setHeight() {
                if (window.innerWidth >= 640) {
                    app.style.height = '';
                    return;
                }
                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    return;
                }
                app.style.height = `${window.innerHeight}px`;
            }

            window.addEventListener('resize', setHeight);
            setHeight();
        }

        // --- Unified Skeleton Handlers ---
        function showSkeletons() {
            els.videoSkeleton.classList.remove('opacity-0', 'pointer-events-none');
            els.videoSkeleton.classList.add('opacity-100', 'pointer-events-auto');

            els.metaSkeleton.classList.remove('opacity-0', 'pointer-events-none');
            els.metaSkeleton.classList.add('opacity-100', 'pointer-events-auto');

            els.videoContainer.classList.add('opacity-0', 'blur-[2px]', 'pointer-events-none');
            els.videoContainer.classList.remove('opacity-100', 'blur-none', 'pointer-events-auto');

            els.metaContent.classList.add('opacity-0', 'blur-[2px]', 'pointer-events-none');
            els.metaContent.classList.remove('opacity-100', 'blur-none', 'pointer-events-auto');
        }

        function hideSkeletons() {
            els.videoSkeleton.classList.remove('opacity-100', 'pointer-events-auto');
            els.videoSkeleton.classList.add('opacity-0', 'pointer-events-none');

            els.metaSkeleton.classList.remove('opacity-100', 'pointer-events-auto');
            els.metaSkeleton.classList.add('opacity-0', 'pointer-events-none');

            els.videoContainer.classList.remove('opacity-0', 'blur-[2px]', 'pointer-events-none');
            els.videoContainer.classList.add('opacity-100', 'blur-none', 'pointer-events-auto');

            els.metaContent.classList.remove('opacity-0', 'blur-[2px]', 'pointer-events-none');
            els.metaContent.classList.add('opacity-100', 'blur-none', 'pointer-events-auto');
        }

        // --- YouTube Logic ---
        function extractVideoID(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|live)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function updatePlayButtonState(state) {
            const playText = els.playContentDefault.querySelector('span');
            if (state === 'default') {
                if (playText) playText.textContent = 'Play';
                els.playBtn.className = 'flex-1 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white rounded-xl font-medium shadow-brand-500/30 shadow-lg transition-all duration-300 flex items-center justify-center group h-full overflow-hidden shrink-0 relative';
                els.playContentDefault.className = 'absolute flex items-center gap-2 transition-all duration-300 opacity-100 blur-none';
                els.playContentPlaying.className = 'absolute flex items-center gap-[4px] text-brand-600 transition-all duration-300 opacity-0 blur-[2px] pointer-events-none';
            } else if (state === 'playing') {
                els.playBtn.className = 'flex-1 bg-slate-100 hover:bg-slate-200 text-brand-600 rounded-xl font-medium transition-all duration-300 flex items-center justify-center group h-full overflow-hidden shrink-0 relative';
                els.playContentDefault.className = 'absolute flex items-center gap-2 transition-all duration-300 opacity-0 blur-[2px] pointer-events-none';
                els.playContentPlaying.className = 'absolute flex items-center gap-[4px] text-brand-600 transition-all duration-300 opacity-100 blur-none';
            } else if (state === 'paused') {
                if (playText) playText.textContent = 'Play';
                els.playBtn.className = 'flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition-all duration-300 flex items-center justify-center group h-full overflow-hidden shrink-0 relative';
                els.playContentDefault.className = 'absolute flex items-center gap-2 transition-all duration-300 opacity-100 blur-none';
                els.playContentPlaying.className = 'absolute flex items-center gap-[4px] text-brand-600 transition-all duration-300 opacity-0 blur-[2px] pointer-events-none';
            }
        }

        function setPlayingStateUI(playing, isLoading = false) {
            isZenPlaying = playing;
            if (playing) {
                els.audioPlayPauseBtn.classList.add('group');
                els.audioWaveform.classList.remove('hidden');
                els.audioPauseIcon.classList.remove('hidden');
                els.audioPlayIcon.classList.add('hidden');
                updatePlayButtonState('playing');
            } else {
                els.audioPlayPauseBtn.classList.remove('group');
                els.audioWaveform.classList.add('hidden');
                els.audioPauseIcon.classList.add('hidden');
                els.audioPlayIcon.classList.remove('hidden');
                updatePlayButtonState(isLoading ? 'default' : 'paused');
            }
        }

        function onPlayerStateChange(event) {
            if (!currentVideoId) return;
            if (event.data === 1) {
                setPlayingStateUI(true);
            } else if (event.data === 2 || event.data === 0) {
                setPlayingStateUI(false, false);
            } else if (event.data === -1) {
                setPlayingStateUI(false, true);
            }
        }

        function onPlayerError(event) {
            if (!currentVideoId) return;
            setPlayingStateUI(false, true);
            showToast('Video is restricted or unavailable', 'error');
        }

        function handleInputDetect() {
            if (!currentVideoId) return;

            const url = els.urlInput.value.trim();
            const videoId = url.toLowerCase() === '@demo' ? 'jfKfPfyJRdk' : extractVideoID(url);
            
            if (videoId !== currentVideoId) {
                updatePlayButtonState('default');
            } else {
                updatePlayButtonState(isZenPlaying ? 'playing' : 'paused');
            }
        }

        function handlePlay(fromInput = false) {
            const url = els.urlInput.value.trim();
            if (!url) {
                showToast('Please enter a YouTube link', 'warning');
                els.urlInput.focus();
                return;
            }

            let videoId = null;

            if (url.toLowerCase() === '@demo') {
                videoId = 'jfKfPfyJRdk';
                showToast('Launching Demo Mode', 'success');
            } else {
                videoId = extractVideoID(url);
            }
            
            if (videoId) {
                if (videoId === currentVideoId) {
                    if (!fromInput) togglePlayPause();
                    return;
                }

                const isChangingMedia = currentVideoId !== null;
                currentVideoId = videoId;
                currentVideoUrl = url;

                const loadMedia = async () => {
                    replaceIframe(`https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1`);
                    
                    try {
                        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                        const data = await res.json();
                        
                        els.metaTitle.textContent = data.title || 'YouTube Video';
                        els.metaAuthor.textContent = data.author_name || 'Unknown Channel';
                        
                        els.audioTitle.textContent = data.title || 'YouTube Video';
                        els.audioAuthor.textContent = data.author_name || 'Unknown Channel';
                        els.audioThumbnail.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
                    } catch (err) {
                        els.metaTitle.textContent = 'YouTube Video';
                        els.metaAuthor.textContent = 'Unknown Uploader';
                        els.audioTitle.textContent = 'YouTube Video';
                        els.audioAuthor.textContent = 'Unknown Uploader';
                        els.audioThumbnail.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
                    }

                    setPlayingStateUI(false, true);

                    setTimeout(() => hideSkeletons(), 400);
                };

                if (isChangingMedia) {
                    showSkeletons();
                    setTimeout(() => loadMedia(), 300);
                } else {
                    history.pushState({ view: 'playing' }, '', '');
                    
                    els.emptyState.classList.remove('opacity-100', 'blur-none', 'pointer-events-auto');
                    els.emptyState.classList.add('opacity-0', 'blur-[2px]', 'pointer-events-none');
                    
                    showSkeletons();
                    
                    setTimeout(() => {
                        els.emptyState.classList.add('hidden');
                        els.playingState.classList.remove('hidden');
                        
                        requestAnimationFrame(() => {
                            els.playingState.classList.remove('opacity-0', 'blur-[2px]', 'pointer-events-none');
                        });

                        els.zenBtn.classList.remove('hidden');
                        els.closeBtn.classList.remove('hidden');
                        void els.zenBtn.offsetWidth;
                        
                        els.zenBtn.classList.remove('max-w-0', 'opacity-0', 'px-0', 'mr-0');
                        els.zenBtn.classList.add('max-w-[52px]', 'opacity-100', 'mr-3');
                        
                        els.closeBtn.classList.remove('max-w-0', 'opacity-0', 'px-0', 'ml-0');
                        els.closeBtn.classList.add('max-w-[52px]', 'opacity-100', 'ml-3');

                        loadMedia();
                    }, 300);
                }

            } else {
                showToast('Invalid YouTube URL', 'error');
            }
        }

        function handleClose(fromPopState = false) {
            if (fromPopState !== true) {
                history.back();
                return;
            }

            currentVideoUrl = '';
            
            // Execute exit zen cleanly without transition to speed up closure
            if(!els.zenControls.classList.contains('hidden')) {
                _syncExitZenMode();
            }

            els.playingState.classList.add('opacity-0', 'blur-[2px]', 'pointer-events-none');
            els.urlInput.value = '';

            els.zenBtn.classList.remove('max-w-[52px]', 'opacity-100', 'mr-3');
            els.zenBtn.classList.add('max-w-0', 'opacity-0', 'px-0', 'mr-0');

            els.closeBtn.classList.remove('max-w-[52px]', 'opacity-100', 'ml-3');
            els.closeBtn.classList.add('max-w-0', 'opacity-0', 'px-0', 'ml-0');

            updatePlayButtonState('default');

            setTimeout(() => {
                replaceIframe('');
                currentVideoId = null;
                
                els.playingState.classList.add('hidden');
                
                els.emptyState.classList.remove('hidden');
                requestAnimationFrame(() => {
                    els.emptyState.classList.remove('opacity-0', 'blur-[2px]', 'pointer-events-none');
                    els.emptyState.classList.add('opacity-100', 'blur-none', 'pointer-events-auto');
                });
                
                els.zenBtn.classList.add('hidden');
                els.closeBtn.classList.add('hidden');
                
                showSkeletons();
                els.playingState.scrollTop = 0;
            }, 300);
        }

        function switchZenMode(mode) {
            currentZenMode = mode;
            if (mode === 'video') {
                els.zenVideoBtn.className = 'w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear bg-white/20 text-white shadow-sm';
                els.zenAudioBtn.className = 'w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear text-white/60 hover:text-white hover:bg-white/10';
                
                els.audioCard.classList.add('hidden');
                
                els.videoWrapper.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] sm:w-[60vw] max-w-[1000px] aspect-video z-50 rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all duration-300 ease-linear bg-black pointer-events-auto';
                els.videoWrapper.classList.remove('opacity-0');
            } else {
                els.zenAudioBtn.className = 'w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear bg-white/20 text-white shadow-sm';
                els.zenVideoBtn.className = 'w-9 h-9 rounded-full flex items-center justify-center transition-all duration-200 ease-linear text-white/60 hover:text-white hover:bg-white/10';
                
                els.audioCard.classList.remove('hidden');
                
                els.videoWrapper.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] sm:w-[60vw] max-w-[1000px] aspect-video z-50 rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all duration-300 ease-linear bg-black opacity-0 pointer-events-none';
            }
        }

        function _syncEnterZenMode(mode) {
            els.appHeader.classList.add('hidden');
            els.actionBar.classList.add('hidden');
            els.videoMetadata.classList.add('hidden');
            els.zenControls.classList.remove('hidden');
            
            document.body.classList.remove('bg-slate-100');
            document.body.classList.add('bg-[#0f0f0f]');
            
            els.appWrapper.classList.remove('bg-white', 'sm:border', 'sm:shadow-2xl', 'max-w-[480px]', 'sm:h-[95vh]');
            els.appWrapper.classList.add('bg-transparent', 'w-full', 'max-w-none');

            els.mainContent.classList.remove('bg-slate-50/50');
            els.mainContent.classList.add('bg-transparent');

            switchZenMode(mode);
        }

        function _syncExitZenMode() {
            els.appHeader.classList.remove('hidden');
            els.actionBar.classList.remove('hidden');
            els.videoMetadata.classList.remove('hidden');
            els.zenControls.classList.add('hidden');
            els.audioCard.classList.add('hidden');

            document.body.classList.add('bg-slate-100');
            document.body.classList.remove('bg-[#0f0f0f]');

            els.appWrapper.classList.add('bg-white', 'sm:border', 'sm:shadow-2xl', 'max-w-[480px]', 'sm:h-[95vh]');
            els.appWrapper.classList.remove('bg-transparent', 'max-w-none');

            els.mainContent.classList.add('bg-slate-50/50');
            els.mainContent.classList.remove('bg-transparent');

            els.videoWrapper.className = 'w-full aspect-video sticky top-0 z-10 flex-shrink-0 shadow-sm relative overflow-hidden bg-slate-100 transition-all duration-300 ease-linear';
        }

        function enterZenMode(mode = 'video') {
            history.pushState({ view: 'playing-zen' }, '', '');
            
            // Start View Transition morph for seamless layout swaps
            if (document.startViewTransition) {
                document.startViewTransition(() => _syncEnterZenMode(mode));
            } else {
                _syncEnterZenMode(mode);
            }
        }

        function exitZenMode() {
            if (document.startViewTransition) {
                document.startViewTransition(() => _syncExitZenMode());
            } else {
                _syncExitZenMode();
            }
        }

        function togglePlayPause() {
            if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
            
            const state = ytPlayer.getPlayerState();
            if (state === 1) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }

        // --- Toast Notification System ---
        function showToast(message, type = 'success') {
            const el = document.createElement('div');
            const colorClass = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-slate-800');
            const icon = type === 'error' ? 'circle-alert' : (type === 'warning' ? 'triangle-alert' : 'info');
            
            el.className = `${colorClass} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium transform transition-all duration-300 translate-y-4 opacity-0 pointer-events-auto min-w-[200px] justify-center`;
            el.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span>${message}</span>`;
            
            while (els.toastContainer.children.length >= 3) {
                els.toastContainer.firstChild.remove();
            }
            
            els.toastContainer.appendChild(el);
            lucide.createIcons({ root: el });
            
            requestAnimationFrame(() => {
                el.classList.remove('translate-y-4', 'opacity-0');
            });
            
            setTimeout(() => {
                el.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => {
                    if (el.parentNode) el.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
