<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Simple, customizable QR Code generator." />
  <title>QR Code Generator</title>

  <!-- qr-code-styling Library -->
  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts: Geist, Geist Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            },
          },
          transitionProperty: {
            width: 'width',
            spacing: 'margin, padding',
          },
        },
      },
    };
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Constrain canvas to prevent visual pop during high-res export */
    #qr-canvas-holder canvas,
    #qr-canvas-holder svg {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }

    /* Custom scrollbar for better visual integration on non-mobile */
    @media (min-width: 640px) {
      html {
        scrollbar-width: thin;
        scrollbar-color: #d4d4d8 transparent;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;
      }
    }

    .card-tap-highlight {
      transition:
        background-color 0.2s,
        border-color 0.2s;
    }

    .card-tap-highlight:active {
      background-color: #f8fafc;
    }
  </style>
</head>

<body class="bg-[#f5f5f5] text-zinc-800 h-[100dvh] flex justify-center overflow-hidden">
  <!-- Main App Container -->
  <div id="app-wrapper"
    class="w-full max-w-[480px] bg-white h-full sm:h-[95vh] sm:my-auto sm:rounded-2xl sm:shadow-2xl flex flex-col relative overflow-hidden border-zinc-200 sm:border">
    <!-- Header -->
    <header
      class="bg-white/90 backdrop-blur-md z-20 border-b border-zinc-100 p-4 sm:p-6 flex justify-between items-center flex-shrink-0">
      <div class="flex items-center gap-2 sm:gap-3">
        <div
          class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white shadow-brand-500/30 shadow-lg">
          <i data-lucide="qr-code" class="w-4 h-4"></i>
        </div>
        <div>
          <h1 class="font-bold text-2xl tracking-tight text-zinc-900 leading-tight">
            QR Code Generator
          </h1>
        </div>
      </div>
    </header>

    <!-- Sticky Header Group (QR Preview + Separator) -->
    <div id="stickyHeader" class="flex-shrink-0 z-10 relative transition-shadow duration-300">
      <!-- Sticky QR Preview Container -->
      <div class="bg-zinc-50/50 px-4 sm:px-6 py-4 relative flex justify-center">
        <div
          class="bg-white border border-zinc-200 rounded-2xl p-4 sm:p-6 shadow-sm flex flex-col items-center relative w-fit mx-auto">
          <div id="qr-card" class="relative flex items-center justify-center w-[200px] h-[200px]">
            <div id="qr-canvas-holder" class="w-full h-full flex items-center justify-center">
              <!-- Rendered canvas / svg goes here -->
            </div>
            <!-- Loading Indicator -->
            <div id="qr-loading"
              class="absolute inset-0 bg-white/80 flex items-center justify-center opacity-0 pointer-events-none transition-opacity">
              <i data-lucide="loader-2" class="w-6 h-6 text-brand-500 animate-spin"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-zinc-50/50 relative">
        <hr class="border-zinc-200" />
      </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto relative bg-zinc-50/50 scroll-smooth p-4 sm:p-6" id="mainScroll">
      <div class="space-y-4 sm:space-y-6">
        <!-- DATA SECTION -->
        <div>
          <div class="flex items-center justify-between mb-4 sm:mb-6">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 bg-brand-600 rounded-md flex items-center justify-center text-white">
                <i data-lucide="database" class="w-3.5 h-3.5"></i>
              </div>
              <h2 class="font-bold text-zinc-900 tracking-tight">Data Payload</h2>
            </div>
            <span id="char-counter"
              class="text-[10px] font-mono text-zinc-500 font-bold bg-zinc-100 px-2 py-1 rounded uppercase tracking-wider">
              0 chars
            </span>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">
                Data Type
              </label>
              <select id="dataTypeSelector" onchange="switchDataType(this.value)"
                class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-sm font-medium">
                <option value="url" selected>Text / Link</option>
                <option value="wifi">Wi-Fi Network</option>
                <option value="vcard">Contact (vCard)</option>
                <option value="email">Email</option>
                <option value="sms">SMS</option>
                <option value="whatsapp">WhatsApp</option>
              </select>
            </div>

            <!-- DYNAMIC FORMS -->
            <div id="forms-container">

              <!-- URL Form -->
              <div id="form-url" class="space-y-3">
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                    <span>Content</span>
                    <span
                      class="bg-brand-100 text-brand-600 px-1.5 py-0.5 rounded text-[10px] tracking-widest font-bold">REQUIRED</span>
                  </label>
                  <textarea id="input-url" rows="3"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-zinc-400 text-sm font-medium resize-y min-h-[60px]"
                    placeholder="Enter text or paste a link (e.g. https://example.com)"
                    oninput="onFormChange()"></textarea>
                </div>
              </div>

              <!-- WiFi Form -->
              <div id="form-wifi" class="hidden space-y-4">
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                    <span>Network Name (SSID)</span>
                    <span
                      class="bg-brand-100 text-brand-600 px-1.5 py-0.5 rounded text-[10px] tracking-widest font-bold">REQUIRED</span>
                  </label>
                  <input type="text" id="wifi-ssid"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-zinc-400 text-sm font-medium"
                    placeholder="My Wi-Fi" oninput="onFormChange()" />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">
                    Network Password
                  </label>
                  <input type="password" id="wifi-pass"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-zinc-400 text-sm font-medium"
                    placeholder="1234567890" oninput="onFormChange()" />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">
                    Security Type
                  </label>
                  <div class="grid grid-cols-3 gap-2 sm:gap-3">
                    <label
                      class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                      <input type="radio" name="wifi-sec" value="WPA" class="peer sr-only" checked
                        onchange="onFormChange()" />
                      <div class="flex items-center justify-center w-full">
                        <span
                          class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700">WPA/WPA2</span>
                      </div>
                    </label>
                    <label
                      class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                      <input type="radio" name="wifi-sec" value="WEP" class="peer sr-only" onchange="onFormChange()" />
                      <div class="flex items-center justify-center w-full">
                        <span class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700">WEP</span>
                      </div>
                    </label>
                    <label
                      class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                      <input type="radio" name="wifi-sec" value="nopass" class="peer sr-only"
                        onchange="onFormChange()" />
                      <div class="flex items-center justify-center w-full">
                        <span
                          class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700">None</span>
                      </div>
                    </label>
                  </div>
                </div>
              </div>

              <!-- Contact (vCard) Form -->
              <div id="form-vcard" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2 sm:gap-3">
                  <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">First
                      Name</label>
                    <input type="text" id="card-first"
                      class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                      placeholder="John" oninput="onFormChange()" />
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Last
                      Name</label>
                    <input type="text" id="card-last"
                      class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                      placeholder="Doe" oninput="onFormChange()" />
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-2 sm:gap-3">
                  <div>
                    <label
                      class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Phone</label>
                    <input type="tel" id="card-phone"
                      class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                      placeholder="+1234567890" oninput="onFormChange()" />
                  </div>
                  <div>
                    <label
                      class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Email</label>
                    <input type="email" id="card-email"
                      class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                      placeholder="john@example.com" oninput="onFormChange()" />
                  </div>
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Organization</label>
                  <input type="text" id="card-org"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="Company Inc." oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Website</label>
                  <input type="url" id="card-web"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="https://example.com" oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Address</label>
                  <input type="text" id="card-addr"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="Street, City, Country" oninput="onFormChange()" />
                </div>
              </div>

              <!-- Email Form -->
              <div id="form-email" class="hidden space-y-4">
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                    <span>Recipient Email</span>
                    <span
                      class="bg-brand-100 text-brand-600 px-1.5 py-0.5 rounded text-[10px] tracking-widest font-bold">REQUIRED</span>
                  </label>
                  <input type="email" id="email-to"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="hello@example.com" oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Subject</label>
                  <input type="text" id="email-sub"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="Email Subject" oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Message</label>
                  <textarea id="email-body" rows="2"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium resize-y"
                    placeholder="Message contents..." oninput="onFormChange()"></textarea>
                </div>
              </div>

              <!-- SMS Form -->
              <div id="form-sms" class="hidden space-y-4">
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                    <span>Phone Number</span>
                    <span
                      class="bg-brand-100 text-brand-600 px-1.5 py-0.5 rounded text-[10px] tracking-widest font-bold">REQUIRED</span>
                  </label>
                  <input type="tel" id="sms-phone"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="+15551234567" oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Message</label>
                  <textarea id="sms-msg" rows="2"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium resize-y"
                    placeholder="SMS text..." oninput="onFormChange()"></textarea>
                </div>
              </div>

              <!-- WhatsApp Form -->
              <div id="form-whatsapp" class="hidden space-y-4">
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                    <span>Phone Number</span>
                    <span
                      class="bg-brand-100 text-brand-600 px-1.5 py-0.5 rounded text-[10px] tracking-widest font-bold">REQUIRED</span>
                  </label>
                  <input type="tel" id="wa-phone"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium"
                    placeholder="15551234567 (with country code)" oninput="onFormChange()" />
                </div>
                <div>
                  <label
                    class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Message</label>
                  <textarea id="wa-msg" rows="2"
                    class="block w-full p-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none placeholder-zinc-400 text-sm font-medium resize-y"
                    placeholder="Pre-filled message..." oninput="onFormChange()"></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        <hr class="border-zinc-200" />
        <!-- STYLING CONFIGURATION ACCORDION -->
        <div>
          <button type="button" onclick="toggleAccordion('stylingAdvanced', 'stylingAdvancedIcon')"
            class="w-full flex items-center justify-between mb-4 sm:mb-6 group">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 bg-brand-600 rounded-md flex items-center justify-center text-white">
                <i data-lucide="palette" class="w-3.5 h-3.5"></i>
              </div>
              <h2 class="font-bold text-zinc-900 tracking-tight group-hover:text-brand-600 transition-colors">Appearance
                Settings</h2>
            </div>
            <i data-lucide="chevron-down" id="stylingAdvancedIcon"
              class="w-4 h-4 text-zinc-400 transition-transform duration-200"></i>
          </button>
          <div id="stylingAdvanced" class="hidden space-y-4 sm:space-y-6">

            <!-- Patterns & Colors -->
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Dot
                Pattern</label>
              <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-3">
                <label
                  class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                  <input type="radio" name="dot-style" value="square" class="peer sr-only" checked
                    onchange="updateQRStyling()" />
                  <span
                    class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700 mx-auto">Square</span>
                </label>
                <label
                  class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                  <input type="radio" name="dot-style" value="rounded" class="peer sr-only"
                    onchange="updateQRStyling()" />
                  <span
                    class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700 mx-auto">Rounded</span>
                </label>
                <label
                  class="relative flex cursor-pointer rounded-xl border border-zinc-200 bg-white p-3 shadow-sm focus:outline-none transition-all hover:border-brand-200 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 has-[:checked]:ring-1 has-[:checked]:ring-brand-500 group">
                  <input type="radio" name="dot-style" value="dots" class="peer sr-only" onchange="updateQRStyling()" />
                  <span
                    class="text-sm font-semibold text-zinc-900 group-has-[:checked]:text-brand-700 mx-auto">Dots</span>
                </label>
              </div>
            </div>

            <!-- Padding & Transparent BG -->
            <div class="grid grid-cols-2 gap-2 sm:gap-3">
              <div>
                <label
                  class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                  <span>Padding</span>
                  <span id="padding-val" class="text-zinc-400 font-mono text-xs">0</span>
                </label>
                <div class="flex items-center w-full p-3 bg-white border border-zinc-200 rounded-xl h-[50px]">
                  <input type="range" id="qr-padding" min="0" max="10" value="0" step="1" oninput="updateQRStyling()"
                    class="block w-full accent-brand-500 cursor-pointer" />
                </div>
              </div>

              <div>
                <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">
                  Background
                </label>
                <div
                  class="relative flex rounded-xl border border-zinc-200 bg-white p-3 shadow-sm transition-all hover:border-brand-200 group h-[50px]">
                  <div class="flex items-center justify-between w-full h-full">
                    <div class="flex items-center gap-2">
                      <i data-lucide="square-dashed" class="w-4 h-4 text-zinc-400"></i>
                      <span class="text-sm font-medium text-zinc-700">Transparent</span>
                    </div>
                    <label
                      class="relative inline-flex h-5 w-9 items-center rounded-full bg-zinc-200 transition-colors group-has-[:checked]:bg-brand-600 flex-shrink-0 cursor-pointer">
                      <input type="checkbox" id="bg-transparent" class="peer sr-only" onchange="updateQRStyling()" />
                      <span
                        class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform translate-x-1 group-has-[:checked]:translate-x-5"></span>
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Colors -->
            <div class="grid grid-cols-2 gap-2 sm:gap-3">
              <div>
                <label
                  class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Foreground
                  Color</label>
                <div
                  class="flex items-center gap-2 sm:gap-3 w-full p-3 bg-white border border-zinc-200 rounded-xl focus-within:ring-2 focus-within:ring-brand-500">
                  <input type="color" id="dot-solid" value="#18181b"
                    class="block w-6 h-6 rounded cursor-pointer border-0 p-0 bg-transparent"
                    oninput="updateQRStyling()" />
                  <span class="text-sm font-medium text-zinc-700">QR Code</span>
                </div>
              </div>
              <div>
                <label
                  class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3">Background
                  Color</label>
                <div
                  class="flex items-center gap-2 sm:gap-3 w-full p-3 bg-white border border-zinc-200 rounded-xl focus-within:ring-2 focus-within:ring-brand-500">
                  <input type="color" id="bg-solid" value="#ffffff"
                    class="block w-6 h-6 rounded cursor-pointer border-0 p-0 bg-transparent"
                    oninput="updateQRStyling()" />
                  <span class="text-sm font-medium text-zinc-700">Canvas</span>
                </div>
              </div>
            </div>

            <!-- Error Correction -->
            <div>
              <label
                class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 sm:mb-3 flex items-center justify-between">
                <span>Error Correction Level</span>
                <div class="relative group cursor-help">
                  <i data-lucide="info" class="w-3.5 h-3.5 text-zinc-400 hover:text-zinc-600 transition-colors"></i>
                  <div

                  <input type="radio" name="export-size" value="2048" class="sr-only" />

    <!-- Bottom Sticky Action Bar -->
    <div

      <button onclick="triggerQRDownload(this)"
        class="flex-1 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white py-3 px-4 rounded-xl font-medium shadow-brand-500/20 shadow-lg transition-all flex items-center justify-center gap-2 group">

          title="Copy Image">
          <i data-lucide="copy" class="w-5 h-5"></i>
        </button>
        <button onclick="resetInputs()"
          class="w-12 h-12 flex items-center justify-center rounded-xl bg-zinc-100 text-zinc-600 hover:bg-zinc-200 hover:text-red-500 transition-colors"
          title="Clear Data">
          <i data-lucide="rotate-ccw" class="w-5 h-5"></i>

  </div>

  <!-- Application Script logic -->
  <script>
    // --- Constants & Config ---
    const CONFIG = {};

    // --- State Management ---
    let currentDataType = 'url';
    let qrCodeInstance = null;
    let activeLogo = null;
    let activeLogoImg = null;
    let activeLogoProcessed = null;
    let activeLogoNaturalWidth = 0;
    let activeLogoNaturalHeight = 0;
    let activeLogoAspectRatio = 1;

    const activeVisuals = {
      dotStyle: 'square',
      ecc: 'Q',
      dotColor: '#18181b',
      bgColor: '#ffffff',
      bgTransparent: false,
      padding: 0,
      logoSize: 1,
      logoForceSquare: true,
      logoPaddingValue: 0
    };

    // --- DOM Elements ---
    const els = {
      qrCanvasHolder: document.getElementById('qr-canvas-holder'),
      qrLoading: document.getElementById('qr-loading'),
      charCounter: document.getElementById('char-counter'),
      logoUploadBox: document.getElementById('logo-upload-box'),
      logoPreviewBox: document.getElementById('logo-preview-box'),
      logoPreviewImg: document.getElementById('logo-preview-img'),
      exportFilename: document.getElementById('export-filename'),
      mainScroll: document.getElementById('mainScroll'),
      stickyHeader: document.getElementById('stickyHeader'),
    };

    // --- Initialization ---
    // Boot
    document.addEventListener('DOMContentLoaded', () => {
      setupMobileHeight();
      initQRCode();
      resetInputs();
      lucide.createIcons();

      document.addEventListener('dragover', (e) => e.preventDefault());
      document.addEventListener('drop', (e) => e.preventDefault());

      els.mainScroll.addEventListener('scroll', () => {
        if (els.mainScroll.scrollTop > 10) {
          els.stickyHeader.classList.add('shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05)]');
        } else {
          els.stickyHeader.classList.remove('shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05)]');
        }
      });
    });

    // --- Event Listeners ---
    function processLogoFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        activeLogo = e.target.result;
        els.logoPreviewImg.src = activeLogo;

        els.logoUploadBox.classList.add('hidden');
        els.logoUploadBox.classList.remove('flex');

        els.logoPreviewBox.classList.remove('hidden');

        const img = new Image();
        img.onload = () => {
          activeLogoImg = img;
          activeLogoNaturalWidth = img.width;
          activeLogoNaturalHeight = img.height;

          const maxDim = Math.max(img.width, img.height);
          const minDim = Math.min(img.width, img.height);
          activeLogoAspectRatio = minDim ? (maxDim / minDim) : 1;

          buildLogoImage();
          updateQRStyling();
        };
        img.src = activeLogo;
      };
      reader.readAsDataURL(file);
    }

    function handleLogoUpload(event) {
      processLogoFile(event.target.files[0]);
    }

    function handleLogoDragOver(event) {
      event.preventDefault();
      event.stopPropagation();
      const el = event.currentTarget;
      el.classList.add('border-brand-500', 'bg-brand-50');
      el.classList.remove('border-zinc-300', 'border-zinc-200');
    }

    function handleLogoDragLeave(event) {
      event.preventDefault();
      event.stopPropagation();
      const el = event.currentTarget;
      el.classList.remove('border-brand-500', 'bg-brand-50');
      if (el.id === 'logo-upload-box') {
        el.classList.add('border-zinc-300');
      } else {
        el.classList.add('border-zinc-200');
      }
    }

    function handleLogoDrop(event) {
      event.preventDefault();
      event.stopPropagation();
      const el = event.currentTarget;
      el.classList.remove('border-brand-500', 'bg-brand-50');
      if (el.id === 'logo-upload-box') {
        el.classList.add('border-zinc-300');
      } else {
        el.classList.add('border-zinc-200');
      }

      const dt = event.dataTransfer;
      if (dt && dt.files && dt.files.length > 0) {
        processLogoFile(dt.files[0]);
      }
    }

    function buildLogoImage() {
      if (!activeLogoImg || !activeLogoNaturalWidth) {
        activeLogoProcessed = null;
        return;
      }
      const w = activeLogoNaturalWidth;
      const h = activeLogoNaturalHeight;
      const forceSquare = activeVisuals.logoForceSquare;
      const padLevel = activeVisuals.logoPaddingValue;

      if (padLevel === 0 && !forceSquare) {
        // No padding and no force square — use the original image directly
        activeLogoProcessed = activeLogo;
        return;
      }

      // Base canvas size: if forcing square, use max dimension; otherwise use original
      let canvasW = forceSquare ? Math.max(w, h) : w;
      let canvasH = forceSquare ? Math.max(w, h) : h;

      // Add padding as a percentage of the base canvas size
      const padFraction = padLevel * 0.04; // 0 to 0.40
      const padX = Math.round(canvasW * padFraction);
      const padY = Math.round(canvasH * padFraction);
      const totalW = canvasW + padX * 2;
      const totalH = canvasH + padY * 2;

      const canvas = document.createElement('canvas');
      canvas.width = totalW;
      canvas.height = totalH;
      const ctx = canvas.getContext('2d');
      const dx = padX + (canvasW - w) / 2;
      const dy = padY + (canvasH - h) / 2;

      ctx.drawImage(activeLogoImg, dx, dy, w, h);
      activeLogoProcessed = canvas.toDataURL('image/png');
    }

    function removeLogo() {
      activeLogo = null;
      activeLogoImg = null;
      activeLogoProcessed = null;
      activeLogoNaturalWidth = 0;
      activeLogoNaturalHeight = 0;
      activeLogoAspectRatio = 1;
      els.logoPreviewBox.classList.add('hidden');

      els.logoUploadBox.classList.remove('hidden');
      els.logoUploadBox.classList.add('flex');

      document.getElementById('logo-uploader').value = '';
      const changeUploader = document.getElementById('logo-uploader-change');
      if (changeUploader) changeUploader.value = '';

      updateQRStyling();
    }

    async function triggerQRDownload(btn) {
      let filename = els.exportFilename.value.trim() || els.exportFilename.placeholder || 'qrcode';
      const ext = document.querySelector('input[name="export-format"]:checked').value;
      const size = ext === 'svg' ? 200 : parseInt(document.querySelector('input[name="export-size"]:checked').value);

      try {
        const exportQR = new QRCodeStyling(getQROptions(size, generatePayload(true)));
        await exportQR.download({ name: filename, extension: ext });
        setButtonFeedback(btn, true, 'Downloaded!');
      } catch (err) {
        console.error(err);
        setButtonFeedback(btn, false, 'Failed');
      }
    }

    async function copyQRToClipboard(btn) {
      if (!navigator.clipboard || !window.ClipboardItem) return setButtonFeedback(btn, false);

      const format = document.querySelector('input[name="export-format"]:checked').value;
      if (format === 'svg') {
        return setButtonFeedback(btn, false);
      }

      const size = parseInt(document.querySelector('input[name="export-size"]:checked').value);

      const makeBlob = async () => {
        const exportQR = new QRCodeStyling(getQROptions(size, generatePayload(true)));
        const blob = await exportQR.getRawData('png');
        if (!blob) throw new Error('Failed to generate image');
        return blob;
      };

      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': makeBlob() })
        ]);
        setButtonFeedback(btn, true);
      } catch (e) {
        try {
          const blob = await makeBlob();
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          setButtonFeedback(btn, true);
        } catch (err) {
          console.error(err);
          setButtonFeedback(btn, false);
        }
      }
    }


    // --- Core Logic ---
    function getQROptions(size, data) {
      const corners = getCornerStyles(activeVisuals.dotStyle);
      return {
        width: size,
        height: size,
        data: data,
        margin: Math.floor(size * (activeVisuals.padding * 0.02)),
        qrOptions: { errorCorrectionLevel: activeVisuals.ecc },
        dotsOptions: { type: activeVisuals.dotStyle, color: activeVisuals.dotColor },
        backgroundOptions: { color: activeVisuals.bgTransparent ? 'transparent' : activeVisuals.bgColor },
        cornersSquareOptions: { type: corners.square, color: activeVisuals.dotColor },
        cornersDotOptions: { type: corners.dot, color: activeVisuals.dotColor },
        image: activeLogoProcessed || activeLogo,
        imageOptions: {
          crossOrigin: "anonymous",
          hideBackgroundDots: true,
          imageSize: ([0.15, 0.22, 0.30, 0.38, 0.46][activeVisuals.logoSize - 1] || 0.15)
            * (activeVisuals.logoForceSquare ? activeLogoAspectRatio : 1)
            * (1 + 2 * (activeVisuals.logoPaddingValue * 0.04)),
          margin: 0
        }
      };
    }

    function initQRCode() {
      qrCodeInstance = new QRCodeStyling(getQROptions(200, "https://example.com"));
      qrCodeInstance.append(els.qrCanvasHolder);
    }

    function switchDataType(type) {
      currentDataType = type;
      const forms = ['url', 'wifi', 'vcard', 'email', 'sms', 'whatsapp'];
      forms.forEach(t => {
        const form = document.getElementById(`form-${t}`);
        if (form) {
          if (t === type) form.classList.remove('hidden');
          else form.classList.add('hidden');
        }
      });
      generatePayload();
    }

    function generatePayload(isInitial = false) {
      let payload = '';
      let fileHint = 'qr-code';

      switch (currentDataType) {
        case 'url':
          const urlVal = document.getElementById('input-url').value.trim();
          payload = urlVal || 'https://example.com';
          if (urlVal) fileHint = 'qr-link';
          break;
        case 'wifi':
          const ssid = document.getElementById('wifi-ssid').value.trim();
          const pass = document.getElementById('wifi-pass').value.trim();
          const sec = document.querySelector('input[name="wifi-sec"]:checked').value;
          payload = sec === 'nopass' ? `WIFI:S:${escapeWifiString(ssid)};T:nopass;;` : `WIFI:S:${escapeWifiString(ssid)};T:${sec};P:${escapeWifiString(pass)};;`;
          fileHint = `qr-wifi-${ssid || 'network'}`;
          break;
        case 'vcard':
          const first = document.getElementById('card-first').value.trim();
          const last = document.getElementById('card-last').value.trim();
          const phone = document.getElementById('card-phone').value.trim();
          const email = document.getElementById('card-email').value.trim();
          const org = document.getElementById('card-org').value.trim();
          const web = document.getElementById('card-web').value.trim();
          const addr = document.getElementById('card-addr').value.trim();
          payload = `BEGIN:VCARD\nVERSION:3.0\nN:${last};${first};;;\nFN:${first} ${last}\nORG:${org}\nTEL;TYPE=CELL:${phone}\nEMAIL:${email}\nURL:${web}\nADR:;;${addr};;;;\nEND:VCARD`;
          fileHint = `qr-contact-${first || 'info'}`;
          break;
        case 'email':
          const to = document.getElementById('email-to').value.trim();
          const sub = document.getElementById('email-sub').value.trim();
          const body = document.getElementById('email-body').value.trim();
          payload = `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
          fileHint = `qr-email-${to || 'mail'}`;
          break;
        case 'sms':
          const smsPhone = document.getElementById('sms-phone').value.trim();
          const smsMsg = document.getElementById('sms-msg').value.trim();
          payload = `SMSTO:${smsPhone}:${smsMsg}`;
          fileHint = `qr-sms-${smsPhone || 'phone'}`;
          break;
        case 'whatsapp':
          const waPhone = document.getElementById('wa-phone').value.trim();
          const waMsg = document.getElementById('wa-msg').value.trim();
          payload = `https://wa.me/${waPhone}?text=${encodeURIComponent(waMsg)}`;
          fileHint = `qr-wa-${waPhone || 'chat'}`;
          break;
      }

      els.charCounter.textContent = `${payload.length} chars`;
      els.exportFilename.placeholder = fileHint;

      if (!isInitial) triggerQRUpdate(payload);
      return payload;
    }

    let debounceTimer = null;
    function onFormChange() {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => generatePayload(), 150);
    }


    // --- UI Updates ---
    function toggleAccordion(contentId, iconId) {
      const content = document.getElementById(contentId);
      const icon = document.getElementById(iconId);
      const isHidden = content.classList.contains('hidden');
      content.classList.toggle('hidden', !isHidden);
      icon.style.transform = isHidden ? 'rotate(180deg)' : '';
    }

    function triggerQRUpdate(data) {
      if (!qrCodeInstance) return;
      els.qrLoading.classList.remove('opacity-0', 'pointer-events-none');

      try {
        qrCodeInstance.update(getQROptions(200, data)).then(() => {
          setTimeout(() => els.qrLoading.classList.add('opacity-0', 'pointer-events-none'), 100);
        }).catch(err => {
          console.error(err);
          els.qrLoading.classList.add('opacity-0', 'pointer-events-none');
        });
      } catch (e) {
        console.error(e);
        els.qrLoading.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    function updateQRStyling() {
      activeVisuals.dotStyle = document.querySelector('input[name="dot-style"]:checked').value;
      activeVisuals.dotColor = document.getElementById('dot-solid').value;
      activeVisuals.bgColor = document.getElementById('bg-solid').value;
      activeVisuals.ecc = document.getElementById('qr-ecc').value;

      const logoSizeEl = document.getElementById('logo-size');
      if (logoSizeEl) {
        activeVisuals.logoSize = parseInt(logoSizeEl.value);
        document.getElementById('logo-size-val').textContent = activeVisuals.logoSize;
      }

      const logoForceSquareEl = document.getElementById('logo-force-square');
      if (logoForceSquareEl) {
        activeVisuals.logoForceSquare = logoForceSquareEl.checked;
      }

      const logoPaddingEl = document.getElementById('logo-padding');
      if (logoPaddingEl) {
        activeVisuals.logoPaddingValue = parseInt(logoPaddingEl.value);
        document.getElementById('logo-padding-val').textContent = activeVisuals.logoPaddingValue;
      }

      // Rebuild the logo canvas whenever force-square or padding changes
      if (activeLogo) {
        buildLogoImage();
      }

      activeVisuals.bgTransparent = document.getElementById('bg-transparent').checked;
      activeVisuals.padding = parseInt(document.getElementById('qr-padding').value);

      document.getElementById('padding-val').textContent = activeVisuals.padding;

      const bgPicker = document.getElementById('bg-solid').closest('div');
      if (activeVisuals.bgTransparent) {
        bgPicker.classList.add('opacity-50', 'pointer-events-none');
      } else {
        bgPicker.classList.remove('opacity-50', 'pointer-events-none');
      }

      triggerQRUpdate(generatePayload(true));
    }

    function resetInputs() {
      document.getElementById('input-url').value = '';
      document.getElementById('wifi-ssid').value = '';
      document.getElementById('wifi-pass').value = '';
      document.querySelector('input[name="wifi-sec"][value="WPA"]').checked = true;
      ['card-first', 'card-last', 'card-phone', 'card-email', 'card-org', 'card-web', 'card-addr',
        'email-to', 'email-sub', 'email-body', 'sms-phone', 'sms-msg', 'wa-phone', 'wa-msg'].forEach(id => {
          document.getElementById(id).value = '';
        });
      generatePayload();
    }



    function handleFormatChange(format) {
      const sizeInputs = document.querySelectorAll('input[name="export-size"]');
      const sizeLabels = document.querySelectorAll('.size-option-label');
      if (format === 'svg') {
        sizeInputs.forEach(input => input.disabled = true);
        sizeLabels.forEach(label => {
          label.classList.add('opacity-50', 'pointer-events-none');
          label.classList.remove('cursor-pointer');
        });
      } else {
        sizeInputs.forEach(input => input.disabled = false);
        sizeLabels.forEach(label => {
          label.classList.remove('opacity-50', 'pointer-events-none');
          label.classList.add('cursor-pointer');
        });
      }
    }

    function setButtonFeedback(btn, success, overrideText) {
      const originalHTML = btn.innerHTML;
      const isPrimary = btn.classList.contains('bg-brand-600');

      const successClasses = isPrimary
        ? ['bg-emerald-500', 'hover:bg-emerald-600', 'shadow-emerald-500/20']
        : ['bg-emerald-100', 'text-emerald-600', 'hover:bg-emerald-200', 'hover:text-emerald-700'];
      const errorClasses = isPrimary
        ? ['bg-red-500', 'hover:bg-red-600', 'shadow-red-500/20']
        : ['bg-red-100', 'text-red-600', 'hover:bg-red-200', 'hover:text-red-700'];

      const originalClasses = isPrimary
        ? ['bg-brand-600', 'hover:bg-brand-700', 'active:bg-brand-800', 'shadow-brand-500/20']
        : ['bg-zinc-100', 'text-zinc-600', 'hover:bg-zinc-200', 'hover:text-zinc-900'];

      const targetClasses = success ? successClasses : errorClasses;

      btn.classList.remove(...originalClasses);
      btn.classList.add(...targetClasses);

      const iconName = success ? 'check' : 'alert-triangle';
      const iconClass = isPrimary ? 'w-4 h-4' : 'w-5 h-5';

      if (overrideText && isPrimary) {
        btn.innerHTML = `<i data-lucide="${iconName}" class="${iconClass}"></i><span>${overrideText}</span>`;
      } else {
        btn.innerHTML = `<i data-lucide="${iconName}" class="${iconClass}"></i>`;
      }
      lucide.createIcons({ root: btn });

      setTimeout(() => {
        btn.classList.remove(...targetClasses);
        btn.classList.add(...originalClasses);
        btn.innerHTML = originalHTML;
      }, 2000);
    }


    // --- Utilities ---
    function getCornerStyles(dotStyle) {
      if (dotStyle === 'dots') return { square: 'dot', dot: 'dot' };
      if (dotStyle === 'square') return { square: 'square', dot: 'square' };
      return { square: 'extra-rounded', dot: 'dot' };
    }

    function setupMobileHeight() {
      const app = document.getElementById('app-wrapper');
      if (!app) return;

      function setHeight() {
        if (window.innerWidth >= 640) {
          app.style.height = '';
          return;
        }
        if (
          document.activeElement &&
          (document.activeElement.tagName === 'INPUT' ||
            document.activeElement.tagName === 'TEXTAREA')
        ) {
          return;
        }
        app.style.height = `${window.innerHeight}px`;
      }

      window.addEventListener('resize', setHeight);
      setHeight();
    }

    function escapeWifiString(str) {
      return str.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/"/g, '\\"');
    }

  </script>
